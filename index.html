<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Sign-up App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1> Workshop Sign-up App</h1>

    <p>Sign up for your favorite technology workshop.</p>
    <form id="registrationForm>

        <label for="fullName">Full Name:</label>
        <br>

        <input type="text" id="fullName" name="fullName" placeholder="John Smith">
        <br><br>
        <label for="email">Email:</label>
        <br>

        <input type="email" id="email" name="email" placeholder="john@example.com">
        <br><br>

        <lable for="age">Age:</lable>
        <br>

        <input type="number" id="age" name="age" placeholder="18">
        <br><br>


        <label for="workshop">Workshop:</label>
        <br>

        <select id="workshop" name="workshop">

            <option value="">Choose a workshop</option>

            <option value="Programing">Programing</option>

            <option value="Game Development">Game Developmnet</option>

            <option value="Artificial Intelligence">Artificial Intelligence</option>

            <option value="Cybersecurity">Cybersecurity</option>

        </select>
        <br><br>

        <input type="checkbox" id="terms" name="terms">

        <label for="terms">I agree to the terms and conditions</label>

        <br><br>

        <button type="submit">Register</button>

        <p id="message"></p>

    </form>

</body>

<script src="script.js"></script>

</html>
